spring:
  application:
    name: subscription-billing-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/billing}
    username: ${DATABASE_USERNAME:billing}
    password: ${DATABASE_PASSWORD:billing}
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  sql:
    init:
      mode: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: subscription-billing-demo-stable-jwt-secret-change-in-real-production
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

server:
  port: ${PORT:8080}
  error:
    include-message: never
