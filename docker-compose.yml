services:
  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.example
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/billing
      DATABASE_USERNAME: billing
      DATABASE_PASSWORD: billing
    ports:
      - "8080:8080"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing
      POSTGRES_DB: billing
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  postgres_data:
